<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบทะเบียนเครื่องปรับอากาศเชิงคุณภาพ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; }
        .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .nav-link { cursor: pointer; }
        .required-label::after { content: " *"; color: red; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">แอร์คลินิก (Air Clinic)</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" id="nav-dashboard" onclick="showView('dashboard')">📊 Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="nav-manage" onclick="showView('manage')">📝 จัดการข้อมูล / กรอกข้อมูล</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div id="loading" class="text-center my-5" style="display: none;">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2">กำลังโหลดข้อมูล...</p>
    </div>

    <div id="dashboard-view">
        <div class="row mb-3">
            <div class="col-md-4">
                <label>กรองตามผู้รับผิดชอบ (ฝ่าย):</label>
                <select id="filter-dept" class="form-select" onchange="renderDashboard()">
                    <option value="all">-- ทั้งหมด --</option>
                    </select>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card bg-info text-white text-center p-3">
                    <h5>จำนวนแอร์ทั้งหมด</h5>
                    <h2 id="dash-total">0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-success text-white text-center p-3">
                    <h5>ข้อมูลครบถ้วน</h5>
                    <h2 id="dash-complete">0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-warning text-dark text-center p-3">
                    <h5>รอการเติมข้อมูล</h5>
                    <h2 id="dash-incomplete">0</h2>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card p-3">
                    <canvas id="typeChart"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div id="manage-view" class="d-none">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>ฟอร์มบันทึก/แก้ไข ข้อมูลเครื่องปรับอากาศ</h4>
                <button class="btn btn-success" onclick="prepareForm('new')">+ เพิ่มแอร์ใหม่ (ไม่มีในระบบ)</button>
            </div>
            
            <div class="mb-4 p-3 bg-light border rounded">
                <label><strong>ค้นหาแอร์ที่มีในระบบเพื่อแก้ไข:</strong></label>
                <select id="select-air" class="form-select" onchange="loadAirDataToForm()">
                    <option value="">-- เลือกเลขครุภัณฑ์ / สถานที่ติดตั้ง --</option>
                </select>
            </div>

            <form id="airForm" onsubmit="submitForm(event)">
                <input type="hidden" id="rowId"> <h5 class="text-primary border-bottom pb-2">ข้อมูลพื้นฐาน</h5>
                <div class="row mb-3">
                    <div class="col-md-4"><label>เลขครุภัณฑ์</label><input type="text" id="assetId" class="form-control" placeholder="ปล่อยว่างได้หากเป็นแอร์ใหม่"></div>
                    <div class="col-md-4"><label>ยี่ห้อ</label><input type="text" id="brand" class="form-control"></div>
                    <div class="col-md-4"><label>รุ่น</label><input type="text" id="model" class="form-control"></div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-3">
                        <label>ชนิด</label>
                        <select id="type" class="form-select">
                            <option value="">-- เลือก --</option>
                            <option value="ธรรมดา">ธรรมดา</option>
                            <option value="Inverter">Inverter</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label>ประเภท</label>
                        <select id="category" class="form-select">
                            <option value="">-- เลือก --</option>
                            <option value="แอร์แยกส่วน">แอร์แยกส่วน</option>
                            <option value="แอร์รวมศูนย์">แอร์รวมศูนย์</option>
                        </select>
                    </div>
                    <div class="col-md-3"><label>ขนาด (BTU/hr)</label><input type="number" id="btu" class="form-control"></div>
                    <div class="col-md-3">
                        <label>สถานะการใช้งาน</label>
                        <select id="status" class="form-select">
                            <option value="ปกติ">ปกติ</option>
                            <option value="ชำรุด">ชำรุด</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4"><label>ค่าประสิทธิภาพ SEER</label><input type="number" step="0.01" id="seer" class="form-control"></div>
                    <div class="col-md-4"><label>ค่าไฟฟ้าต่อปี (Sticker)</label><input type="number" id="elecCost" class="form-control"></div>
                    <div class="col-md-4"><label>ปีที่ติดตั้ง</label><input type="text" id="installYear" class="form-control"></div>
                </div>

                <h5 class="text-primary border-bottom pb-2 mt-4">สถานที่และการรับผิดชอบ</h5>
                <div class="row mb-3">
                    <div class="col-md-4"><label>ผู้รับผิดชอบ (ฝ่าย)</label><input type="text" id="owner" class="form-control"></div>
                    <div class="col-md-4"><label>สถานที่ติดตั้ง</label><input type="text" id="location" class="form-control"></div>
                    <div class="col-md-4">
                        <label>Zone</label>
                        <select id="zone" class="form-select">
                            <option value="">-- เลือก --</option>
                            <option value="อำนวยการชั้น 1 ส่วนบริการ">อำนวยการชั้น 1 ส่วนบริการ</option>
                            <option value="อำนวยการชั้น 1 Back Office">อำนวยการชั้น 1 Back Office</option>
                            <option value="อำนวยการชั้น 2">อำนวยการชั้น 2</option>
                            <option value="อำนวยการชั้น 3">อำนวยการชั้น 3</option>
                            <option value="IPD 5 ชั้น">IPD 5 ชั้น</option>
                            <option value="ลีลาวดี - ชุมชนฯ">ลีลาวดี - ชุมชนฯ</option>
                            <option value="อาคารโภชนาการ">อาคารโภชนาการ</option>
                            <option value="กลุ่มอาคาร Lab X-ray พขร">กลุ่มอาคาร Lab X-ray พขร</option>
                            <option value="ตึก Cohort">ตึก Cohort</option>
                            <option value="ตึกสันทนาการ">ตึกสันทนาการ</option>
                            <option value="บ้านพักบุคลากร">บ้านพักบุคลากร</option>
                            <option value="ตึก OPD 5 ชั้นใหม่">ตึก OPD 5 ชั้นใหม่</option>
                        </select>
                    </div>
                </div>

                <h5 class="text-danger border-bottom pb-2 mt-4">ข้อมูลเชิงคุณภาพหน้างาน (ใช้ชี้วัดความครบถ้วน)</h5>
                <div class="row mb-3">
                    <div class="col-md-4"><label class="required-label">ชั่วโมงใช้งาน/วัน</label><input type="number" id="hrDay" class="form-control"></div>
                    <div class="col-md-4"><label class="required-label">วันใช้งาน/สัปดาห์</label><input type="number" id="dayWeek" class="form-control"></div>
                    <div class="col-md-4"><label class="required-label">ชั่วโมงใช้งาน/สัปดาห์</label><input type="number" id="hrWeek" class="form-control"></div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6"><label class="required-label">ปริมาตรห้อง (ลบ.ม.) (กว้างxยาวxสูง)</label><input type="text" id="roomVol" class="form-control"></div>
                    <div class="col-md-6"><label class="required-label">จำนวนแอร์รวมในห้องนี้ (เครื่อง)</label><input type="number" id="totalAirRoom" class="form-control"></div>
                </div>
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="required-label">การโดนแดด</label>
                        <select id="sunlight" class="form-select">
                            <option value="">-- เลือก --</option>
                            <option value="ครึ่งวันเช้า">ครึ่งวันเช้า</option>
                            <option value="ครึ่งวันบ่าย">ครึ่งวันบ่าย</option>
                            <option value="ทั้งวัน">ทั้งวัน</option>
                            <option value="ไม่โดนแดดเลย">ไม่โดนแดดเลย</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="required-label">ใช้พัดลมช่วยเมื่อเปิดแอร์</label>
                        <select id="useFan" class="form-select">
                            <option value="">-- เลือก --</option>
                            <option value="ใช้">ใช้</option>
                            <option value="ไม่ใช้">ไม่ใช้</option>
                        </select>
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-12"><label>ซ่อมบำรุงครั้งล่าสุด (เดือน/ปี)</label><input type="text" id="maintenance" class="form-control"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100 fs-5">💾 บันทึกข้อมูล</button>
            </form>
        </div>
    </div>
</div>

<script>
    // URL ของ Web App ที่คุณ Deploy
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyo-3Dn8sFD2iMT5P3ku0GNPtr71eM1JVmkpT9dTHISxrdUlhteosWG41_5LTaAHZg/exec";
    
    let allData = [];
    let charts = {};

    // เริ่มต้นเมื่อเปิดเว็บ
    window.onload = () => {
        fetchData();
    };

    // สลับหน้าจอ
    function showView(view) {
        document.getElementById('dashboard-view').classList.add('d-none');
        document.getElementById('manage-view').classList.add('d-none');
        document.getElementById('nav-dashboard').classList.remove('active');
        document.getElementById('nav-manage').classList.remove('active');

        document.getElementById(`${view}-view`).classList.remove('d-none');
        document.getElementById(`nav-${view}`).classList.add('active');
    }

    // ดึงข้อมูลจาก Google Sheet
    async function fetchData() {
        document.getElementById('loading').style.display = 'block';
        try {
            const response = await fetch(SCRIPT_URL + "?action=getData");
            const result = await response.json();
            allData = result.data; // data คือ array ของ object
            
            populateFiltersAndDropdowns();
            renderDashboard();
        } catch (error) {
            console.error("Error fetching data:", error);
            alert("ไม่สามารถโหลดข้อมูลได้ ลองรีเฟรชหน้าเว็บ");
        }
        document.getElementById('loading').style.display = 'none';
    }

    // เตรียม Dropdown กรองฝ่าย และ Dropdown เลือกแอร์เพื่อแก้ไข
    function populateFiltersAndDropdowns() {
        const depts = new Set(allData.map(item => item.owner).filter(Boolean));
        const deptSelect = document.getElementById('filter-dept');
        deptSelect.innerHTML = '<option value="all">-- ทั้งหมด --</option>';
        depts.forEach(dept => {
            deptSelect.innerHTML += `<option value="${dept}">${dept}</option>`;
        });

        const airSelect = document.getElementById('select-air');
        airSelect.innerHTML = '<option value="">-- เลือกเลขครุภัณฑ์ / สถานที่ติดตั้ง --</option>';
        allData.forEach((item, index) => {
            let label = `${item.assetId || 'ไม่มีเลข'} - ${item.location || 'ไม่ระบุสถานที่'}`;
            airSelect.innerHTML += `<option value="${index}">${label}</option>`;
        });
    }

    // เช็คว่าข้อมูลครบหรือไม่ตามเงื่อนไข
    function isDataComplete(item) {
        return (item.hrDay && item.dayWeek && item.hrWeek && item.roomVol && item.sunlight && item.useFan && item.totalAirRoom);
    }

    // วาด Dashboard
    function renderDashboard() {
        const filterDept = document.getElementById('filter-dept').value;
        let filteredData = allData;
        
        if (filterDept !== 'all') {
            filteredData = allData.filter(item => item.owner === filterDept);
        }

        let completeCount = 0;
        let inverterCount = 0;
        let normalCount = 0;
        let normalStatusCount = 0;
        let brokenStatusCount = 0;

        filteredData.forEach(item => {
            if (isDataComplete(item)) completeCount++;
            if (item.type === 'Inverter') inverterCount++;
            if (item.type === 'ธรรมดา') normalCount++;
            if (item.status === 'ปกติ') normalStatusCount++;
            if (item.status === 'ชำรุด') brokenStatusCount++;
        });

        document.getElementById('dash-total').innerText = filteredData.length;
        document.getElementById('dash-complete').innerText = completeCount;
        document.getElementById('dash-incomplete').innerText = filteredData.length - completeCount;

        drawChart('typeChart', 'สัดส่วนชนิดแอร์', ['Inverter', 'ธรรมดา'], [inverterCount, normalCount], ['#36A2EB', '#FF6384']);
        drawChart('statusChart', 'สถานะการใช้งาน', ['ปกติ', 'ชำรุด'], [normalStatusCount, brokenStatusCount], ['#4BC0C0', '#FF9F40']);
    }

    function drawChart(canvasId, title, labels, data, colors) {
        if (charts[canvasId]) charts[canvasId].destroy();
        const ctx = document.getElementById(canvasId).getContext('2d');
        charts[canvasId] = new Chart(ctx, {
            type: 'pie',
            data: { labels: labels, datasets: [{ data: data, backgroundColor: colors }] },
            options: { plugins: { title: { display: true, text: title } } }
        });
    }

    // โหลดข้อมูลใส่ Form เมื่อเลือกแอร์
    function loadAirDataToForm() {
        const index = document.getElementById('select-air').value;
        if (index === "") { prepareForm('new'); return; }
        
        const item = allData[index];
        document.getElementById('rowId').value = item.rowId; // สำคัญเพื่ออัปเดตบรรทัดเดิม
        
        const fields = ['assetId', 'brand', 'model', 'type', 'category', 'btu', 'seer', 'elecCost', 'installYear', 'hrDay', 'dayWeek', 'hrWeek', 'status', 'maintenance', 'owner', 'location', 'roomVol', 'sunlight', 'useFan', 'totalAirRoom', 'zone'];
        fields.forEach(f => { if(document.getElementById(f)) document.getElementById(f).value = item[f] || ""; });
    }

    // ล้าง Form สำหรับเพิ่มใหม่
    function prepareForm(type) {
        document.getElementById('airForm').reset();
        document.getElementById('rowId').value = ""; // บ่งบอกว่าเป็นรายการใหม่
        document.getElementById('select-air').value = "";
    }

    // ส่งข้อมูลไป Google Sheet
    async function submitForm(e) {
        e.preventDefault();
        document.getElementById('loading').style.display = 'block';

        const payload = {
            action: 'saveData',
            rowId: document.getElementById('rowId').value,
            data: {
                assetId: document.getElementById('assetId').value, brand: document.getElementById('brand').value,
                model: document.getElementById('model').value, type: document.getElementById('type').value,
                category: document.getElementById('category').value, btu: document.getElementById('btu').value,
                seer: document.getElementById('seer').value, elecCost: document.getElementById('elecCost').value,
                installYear: document.getElementById('installYear').value, hrDay: document.getElementById('hrDay').value,
                dayWeek: document.getElementById('dayWeek').value, hrWeek: document.getElementById('hrWeek').value,
                status: document.getElementById('status').value, maintenance: document.getElementById('maintenance').value,
                owner: document.getElementById('owner').value, location: document.getElementById('location').value,
                roomVol: document.getElementById('roomVol').value, sunlight: document.getElementById('sunlight').value,
                useFan: document.getElementById('useFan').value, totalAirRoom: document.getElementById('totalAirRoom').value,
                zone: document.getElementById('zone').value
            }
        };

        try {
            // ใช้ POST mode no-cors หรือ x-www-form-urlencoded เพื่อเลี่ยงปัญหา CORS บน GitHub
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            alert("บันทึกข้อมูลเรียบร้อยแล้ว!");
            fetchData(); // โหลดข้อมูลใหม่
            showView('dashboard');
        } catch (error) {
            console.error("Error saving:", error);
            alert("บันทึกข้อมูลสำเร็จ (หรืออาจมีปัญหาเครือข่าย กรุณารีเฟรชเพื่อตรวจสอบ)");
            fetchData();
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
