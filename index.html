<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบทะเบียนเครื่องปรับอากาศเชิงคุณภาพ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #f4f7f6; 
            font-family: 'Sarabun', sans-serif; 
        }
        .card { 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
            border: none;
        }
        .nav-link { cursor: pointer; }
        .required-label::after { content: " *"; color: red; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">❄️ Air Clinic</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" id="nav-dashboard" onclick="showView('dashboard')">📊 Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="nav-manage" onclick="showView('manage')">📝 จัดการ/กรอกข้อมูล</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div id="loading" class="text-center my-5" style="display: none;">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">กำลังโหลดข้อมูล... โปรดรอสักครู่</p>
    </div>

    <div id="dashboard-view">
        <div class="row mb-4">
            <div class="col-md-4">
                <label class="form-label fw-bold">กรองตามผู้รับผิดชอบ (ฝ่าย):</label>
                <select id="filter-dept" class="form-select shadow-sm" onchange="renderDashboard()">
                    <option value="all">-- ทั้งหมด --</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card bg-info text-white text-center p-4">
                    <h5 class="fw-bold">จำนวนแอร์ทั้งหมด</h5>
                    <h1 id="dash-total" class="display-4 fw-bold">0</h1>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-success text-white text-center p-4">
                    <h5 class="fw-bold">ข้อมูลครบถ้วน</h5>
                    <h1 id="dash-complete" class="display-4 fw-bold">0</h1>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-warning text-dark text-center p-4">
                    <h5 class="fw-bold">รอการเติมข้อมูล</h5>
                    <h1 id="dash-incomplete" class="display-4 fw-bold">0</h1>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card p-3">
                    <canvas id="typeChart"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div id="manage-view" class="d-none">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold text-primary mb-0">ฟอร์มบันทึก/แก้ไข ข้อมูลเครื่องปรับอากาศ</h4>
                <button class="btn btn-success shadow-sm" onclick="prepareForm('new')">+ เพิ่มแอร์ใหม่ (ไม่มีในระบบ)</button>
            </div>
            
            <div class="mb-4 p-3 bg-light border rounded">
                <label class="form-label fw-bold text-secondary">🔍 ค้นหาแอร์ที่มีในระบบเพื่อแก้ไข / เติมข้อมูล:</label>
                <select id="select-air" class="form-select border-primary" onchange="loadAirDataToForm()">
                    <option value="">-- เลือกเลขครุภัณฑ์ / สถานที่ติดตั้ง --</option>
                </select>
            </div>

            <form id="airForm" onsubmit="submitForm(event)">
                <input type="hidden" id="rowId"> <h5 class="text-secondary border-bottom pb-2 mt-2">📍 ข้อมูลพื้นฐาน</h5>
                <div class="row mb-3">
                    <div class="col-md-4"><label class="form-label">เลขครุภัณฑ์</label><input type="text" id="assetId" class="form-control" placeholder="ปล่อยว่างได้หากไม่ทราบ"></div>
                    <div class="col-md-4"><label class="form-label">ยี่ห้อ</label><input type="text" id="brand" class="form-control"></div>
                    <div class="col-md-4"><label class="form-label">รุ่น</label><input type="text" id="model" class="form-control"></div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-3">
                        <label class="form-label">ชนิด</label>
                        <select id="type" class="form-select">
                            <option value="">-- เลือก --</option>
                            <option value="ธรรมดา">ธรรมดา</option>
                            <option value="Inverter">Inverter</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">ประเภท</label>
                        <select id="category" class="form-select">
                            <option value="">-- เลือก --</option>
                            <option value="แอร์แยกส่วน">แอร์แยกส่วน</option>
                            <option value="แอร์รวมศูนย์">แอร์รวมศูนย์</option>
                        </select>
                    </div>
                    <div class="col-md-3"><label class="form-label">ขนาด (BTU/hr)</label><input type="number" id="btu" class="form-control"></div>
                    <div class="col-md-3">
                        <label class="form-label">สถานะการใช้งาน</label>
                        <select id="status" class="form-select">
                            <option value="ปกติ">ปกติ</option>
                            <option value="ชำรุด">ชำรุด</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4"><label class="form-label">ค่าประสิทธิภาพ SEER</label><input type="number" step="0.01" id="seer" class="form-control"></div>
                    <div class="col-md-4"><label class="form-label">ค่าไฟฟ้าต่อปี (Sticker)</label><input type="number" id="elecCost" class="form-control"></div>
                    <div class="col-md-4"><label class="form-label">ปีที่ติดตั้ง</label><input type="text" id="installYear" class="form-control"></div>
                </div>

                <h5 class="text-secondary border-bottom pb-2 mt-4">🏢 สถานที่และการรับผิดชอบ</h5>
                <div class="row mb-3">
                    <div class="col-md-4"><label class="form-label">ผู้รับผิดชอบ (ฝ่าย)</label><input type="text" id="owner" class="form-control"></div>
                    <div class="col-md-4"><label class="form-label">สถานที่ติดตั้ง</label><input type="text" id="location" class="form-control"></div>
                    <div class="col-md-4">
                        <label class="form-label">Zone</label>
                        <select id="zone" class="form-select">
                            <option value="">-- เลือก --</option>
                            <option value="อำนวยการชั้น 1 ส่วนบริการ">อำนวยการชั้น 1 ส่วนบริการ</option>
                            <option value="อำนวยการชั้น 1 Back Office">อำนวยการชั้น 1 Back Office</option>
                            <option value="อำนวยการชั้น 2">อำนวยการชั้น 2</option>
                            <option value="อำนวยการชั้น 3">อำนวยการชั้น 3</option>
                            <option value="IPD 5 ชั้น">IPD 5 ชั้น</option>
                            <option value="ลีลาวดี - ชุมชนฯ">ลีลาวดี - ชุมชนฯ</option>
                            <option value="อาคารโภชนาการ">อาคารโภชนาการ</option>
                            <option value="กลุ่มอาคาร Lab X-ray พขร">กลุ่มอาคาร Lab X-ray พขร</option>
                            <option value="ตึก Cohort">ตึก Cohort</option>
                            <option value="ตึกสันทนาการ">ตึกสันทนาการ</option>
                            <option value="บ้านพักบุคลากร">บ้านพักบุคลากร</option>
                            <option value="ตึก OPD 5 ชั้นใหม่">ตึก OPD 5 ชั้นใหม่</option>
                        </select>
                    </div>
                </div>

                <h5 class="text-danger border-bottom pb-2 mt-4">⚙️ ข้อมูลเชิงคุณภาพหน้างาน (ต้องระบุเพื่อการวิเคราะห์)</h5>
                <div class="row mb-3">
                    <div class="col-md-4"><label class="form-label required-label">ชั่วโมงใช้งาน/วัน</label><input type="number" id="hrDay" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label required-label">วันใช้งาน/สัปดาห์</label><input type="number" id="dayWeek" class="form-control" required></div>
                    <div class="col-md-4"><label class="form-label required-label">ชั่วโมงใช้งาน/สัปดาห์</label><input type="number" id="hrWeek" class="form-control" required></div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6"><label class="form-label required-label">ปริมาตรห้อง (ลบ.ม.) (กว้างxยาวxสูง)</label><input type="text" id="roomVol" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label required-label">จำนวนแอร์รวมในห้องนี้ (เครื่อง)</label><input type="number" id="totalAirRoom" class="form-control" required></div>
                </div>
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label required-label">การโดนแดด</label>
                        <select id="sunlight" class="form-select" required>
                            <option value="">-- เลือก --</option>
                            <option value="ครึ่งวันเช้า">ครึ่งวันเช้า</option>
                            <option value="ครึ่งวันบ่าย">ครึ่งวันบ่าย</option>
                            <option value="ทั้งวัน">ทั้งวัน</option>
                            <option value="ไม่โดนแดดเลย">ไม่โดนแดดเลย</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label required-label">ใช้พัดลมช่วยเมื่อเปิดแอร์</label>
                        <select id="useFan" class="form-select" required>
                            <option value="">-- เลือก --</option>
                            <option value="ใช้">ใช้</option>
                            <option value="ไม่ใช้">ไม่ใช้</option>
                        </select>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-12"><label class="form-label">ซ่อมบำรุงครั้งล่าสุด (เดือน/ปี)</label><input type="text" id="maintenance" class="form-control"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100 fs-5 py-2 shadow-sm">💾 บันทึกข้อมูลเข้า Google Sheet</button>
            </form>
        </div>
    </div>
</div>

<script>
    // URL ของ Web App ใหม่ที่คุณให้มา
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEBbKbE1FXxVZWHX7_s_BE78uEtuBugxRjqPOUCvbSjbRC5x-t7ScEH2T2Z6N7FoAu/exec";
    
    let allData = [];
    let charts = {};

    // เริ่มต้นเมื่อเปิดเว็บ
    window.onload = () => {
        fetchData();
    };

    // สลับหน้าจอ Dashboard และ Manage
    function showView(view) {
        document.getElementById('dashboard-view').classList.add('d-none');
        document.getElementById('manage-view').classList.add('d-none');
        document.getElementById('nav-dashboard').classList.remove('active');
        document.getElementById('nav-manage').classList.remove('active');

        document.getElementById(`${view}-view`).classList.remove('d-none');
        document.getElementById(`nav-${view}`).classList.add('active');
    }

    // ดึงข้อมูลจาก Google Sheet (GET)
    async function fetchData() {
        document.getElementById('loading').style.display = 'block';
        try {
            const response = await fetch(SCRIPT_URL + "?action=getData");
            const result = await response.json();
            
            if(result.status === "error") {
                alert("ข้อผิดพลาดจากฝั่ง Sheet: " + result.message);
                document.getElementById('loading').style.display = 'none';
                return;
            }

            allData = result.data || []; 
            populateFiltersAndDropdowns();
            renderDashboard();
        } catch (error) {
            console.error("Error fetching data:", error);
            alert("ไม่สามารถเชื่อมต่อกับ Google Sheet ได้ ลองรีเฟรชหน้าเว็บ หรือตรวจสอบว่า Deploy Code.gs ถูกต้องหรือไม่");
        }
        document.getElementById('loading').style.display = 'none';
    }

    // เตรียม Dropdown
    function populateFiltersAndDropdowns() {
        // Dropdown สำหรับหน้า Dashboard (กรองตามผู้รับผิดชอบ)
        const depts = new Set(allData.map(item => String(item.owner || "").trim()).filter(Boolean));
        const deptSelect = document.getElementById('filter-dept');
        deptSelect.innerHTML = '<option value="all">-- ทั้งหมด --</option>';
        depts.forEach(dept => {
            deptSelect.innerHTML += `<option value="${dept}">${dept}</option>`;
        });

        // Dropdown สำหรับหน้ากรอกข้อมูล (เลือกแอร์เพื่อแก้ไข)
        const airSelect = document.getElementById('select-air');
        airSelect.innerHTML = '<option value="">-- เลือกเลขครุภัณฑ์ / สถานที่ติดตั้ง --</option>';
        allData.forEach((item, index) => {
            let label = `${item.assetId || 'ไม่มีเลข'} - ${item.location || 'ไม่ระบุสถานที่'} [${item.owner || 'ไม่ระบุฝ่าย'}]`;
            airSelect.innerHTML += `<option value="${index}">${label}</option>`;
        });
    }

    // เช็คว่าข้อมูลจำเป็นถูกกรอกครบหรือไม่
    function isDataComplete(item) {
        return (item.hrDay && item.dayWeek && item.hrWeek && item.roomVol && item.sunlight && item.useFan && item.totalAirRoom);
    }

    // วาด Dashboard
    function renderDashboard() {
        const filterDept = document.getElementById('filter-dept').value;
        let filteredData = allData;
        
        if (filterDept !== 'all') {
            filteredData = allData.filter(item => String(item.owner || "").trim() === filterDept);
        }

        let completeCount = 0;
        let inverterCount = 0;
        let normalCount = 0;
        let normalStatusCount = 0;
        let brokenStatusCount = 0;

        filteredData.forEach(item => {
            if (isDataComplete(item)) completeCount++;
            if (item.type === 'Inverter') inverterCount++;
            if (item.type === 'ธรรมดา') normalCount++;
            if (item.status === 'ปกติ') normalStatusCount++;
            if (item.status === 'ชำรุด') brokenStatusCount++;
        });

        document.getElementById('dash-total').innerText = filteredData.length;
        document.getElementById('dash-complete').innerText = completeCount;
        document.getElementById('dash-incomplete').innerText = filteredData.length - completeCount;

        drawChart('typeChart', 'สัดส่วนชนิดแอร์ (ธรรมดา vs Inverter)', ['Inverter', 'ธรรมดา'], [inverterCount, normalCount], ['#36A2EB', '#FF6384']);
        drawChart('statusChart', 'สถานะการใช้งานแอร์', ['ปกติ', 'ชำรุด'], [normalStatusCount, brokenStatusCount], ['#4BC0C0', '#FF9F40']);
    }

    function drawChart(canvasId, title, labels, data, colors) {
        if (charts[canvasId]) charts[canvasId].destroy();
        const ctx = document.getElementById(canvasId).getContext('2d');
        charts[canvasId] = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: labels, datasets: [{ data: data, backgroundColor: colors }] },
            options: { plugins: { title: { display: true, text: title, font: { size: 16, family: 'Sarabun' } } } }
        });
    }

    // โหลดข้อมูลใส่ Form
    function loadAirDataToForm() {
        const index = document.getElementById('select-air').value;
        if (index === "") { prepareForm('new'); return; }
        
        const item = allData[index];
        document.getElementById('rowId').value = item.rowId; 
        
        const fields = ['assetId', 'brand', 'model', 'type', 'category', 'btu', 'seer', 'elecCost', 'installYear', 'hrDay', 'dayWeek', 'hrWeek', 'status', 'maintenance', 'owner', 'location', 'roomVol', 'sunlight', 'useFan', 'totalAirRoom', 'zone'];
        fields.forEach(f => { 
            if(document.getElementById(f)) {
                document.getElementById(f).value = item[f] || ""; 
            }
        });
    }

    // ล้าง Form 
    function prepareForm(type) {
        document.getElementById('airForm').reset();
        document.getElementById('rowId').value = ""; 
        document.getElementById('select-air').value = "";
    }

    // ส่งข้อมูลไป Google Sheet (POST)
    async function submitForm(e) {
        e.preventDefault(); // ป้องกันเว็บ Refresh
        document.getElementById('loading').style.display = 'block';

        const payload = {
            action: 'saveData',
            rowId: document.getElementById('rowId').value,
            data: {
                assetId: document.getElementById('assetId').value, brand: document.getElementById('brand').value,
                model: document.getElementById('model').value, type: document.getElementById('type').value,
                category: document.getElementById('category').value, btu: document.getElementById('btu').value,
                seer: document.getElementById('seer').value, elecCost: document.getElementById('elecCost').value,
                installYear: document.getElementById('installYear').value, hrDay: document.getElementById('hrDay').value,
                dayWeek: document.getElementById('dayWeek').value, hrWeek: document.getElementById('hrWeek').value,
                status: document.getElementById('status').value, maintenance: document.getElementById('maintenance').value,
                owner: document.getElementById('owner').value, location: document.getElementById('location').value,
                roomVol: document.getElementById('roomVol').value, sunlight: document.getElementById('sunlight').value,
                useFan: document.getElementById('useFan').value, totalAirRoom: document.getElementById('totalAirRoom').value,
                zone: document.getElementById('zone').value
            }
        };

        try {
            // ใช้ text/plain เลี่ยง CORS Preflight บนเบราว์เซอร์
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                },
                body: JSON.stringify(payload)
            });
            
            alert("บันทึกข้อมูลเรียบร้อยแล้ว!");
            prepareForm('new');
            fetchData(); // โหลดข้อมูลใหม่หลังจากบันทึกเสร็จ
            showView('dashboard');
        } catch (error) {
            console.error("Error saving:", error);
            // ฝั่ง Google Apps Script อาจจะไม่คืนค่ากลับมาตามปกติเมื่อเรียกแบบ No-CORS แต่ตัวมันเองบันทึกลง Sheet สำเร็จแล้ว
            alert("ส่งข้อมูลแล้ว (หากมีปัญหาขัดข้อง กรุณารีเฟรชเพื่อตรวจสอบ)");
            fetchData();
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
